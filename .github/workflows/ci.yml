name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  frontend:
    name: Frontend — typecheck & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/fashionos-web

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/fashionos-web/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_ODOO_URL: http://localhost:8069

      - name: Security audit
        run: npm audit --audit-level=high
        continue-on-error: true   # moderate PostCSS in Next.js internals — known, not actionable

  backend:
    name: Backend — Python lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install ruff
        run: pip install ruff

      - name: Lint addons
        # E402: Odoo modules put _logger before imports (convention)
        # E741: lambda l: ... is idiomatic in Odoo filtered() calls
        run: ruff check backend/addons --select E,W,F --ignore E501,F401,E402,E741

name: Deploy

on:
  push:
    branches: [main]

# Only one deploy at a time
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest
    environment: production   # requires manual approval in GitHub env settings

    steps:
      - uses: actions/checkout@v4

      # ── Typecheck before deploy ───────────────────────────────────────────
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/fashionos-web/package-lock.json

      - name: Install & typecheck
        working-directory: frontend/fashionos-web
        run: |
          npm ci --legacy-peer-deps
          npx tsc --noEmit

      # ── SSH deploy ────────────────────────────────────────────────────────
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            set -euo pipefail
            cd /opt/fashionos

            echo "── Pulling latest code ──"
            git pull origin main

            echo "── Building frontend image ──"
            docker compose -f docker-compose.yml -f docker-compose.prod.yml \
              build --no-cache frontend

            echo "── Restarting services ──"
            docker compose -f docker-compose.yml -f docker-compose.prod.yml \
              up -d --remove-orphans

            echo "── Waiting for Odoo to be healthy ──"
            for i in $(seq 1 30); do
              if docker compose exec -T odoo curl -sf http://localhost:8069/web/health; then
                break
              fi
              sleep 5
            done

            echo "── Running pending Odoo module updates ──"
            docker compose exec -T odoo odoo \
              -d "$DB_NAME" \
              --update=fashion_store_api,fashion_store_loyalty,fashion_store_return \
              --stop-after-init \
              --no-http

            echo "── Deploy complete ──"
            docker compose ps

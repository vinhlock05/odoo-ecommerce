name: Security scan

on:
  schedule:
    - cron: "0 8 * * 1"   # every Monday 8am UTC
  workflow_dispatch:

jobs:
  npm-audit:
    name: npm audit (frontend)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/fashionos-web

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/fashionos-web/package-lock.json
      - run: npm ci --legacy-peer-deps
      - name: Audit — fail on high/critical
        run: npm audit --audit-level=high

  python-bandit:
    name: bandit (backend)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install bandit
      - name: Scan for security issues
        run: bandit -r backend/addons -ll -x backend/addons/*/tests

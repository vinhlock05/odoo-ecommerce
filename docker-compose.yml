version: '3.8'

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: fashionos
      POSTGRES_USER: odoo
      POSTGRES_PASSWORD: odoo_secret
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U odoo -d fashionos"]
      interval: 5s
      timeout: 3s
      retries: 10

  odoo:
    image: odoo:19.0
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8069:8069"
    volumes:
      - ./backend/addons:/mnt/extra-addons
      - odoodata:/var/lib/odoo
    environment:
      HOST: db
      USER: odoo
      PASSWORD: odoo_secret
    # v19 command tối ưu cho development, tự động reload khi sửa code Python
    command: >
      odoo
      --db_host=db
      --db_user=odoo
      --db_password=odoo_secret
      --addons-path=/mnt/extra-addons,/usr/lib/python3/dist-packages/odoo/addons
      --dev=all
    labels:
      - "fashionos.service=backend"

volumes:
  pgdata:
  odoodata:

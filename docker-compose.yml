services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-fashionos}
      POSTGRES_USER: ${DB_USER:-odoo}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-odoo_secret}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER:-odoo} -d ${DB_NAME:-fashionos}" ]
      interval: 5s
      timeout: 3s
      retries: 10

  odoo:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        ODOO_IMAGE: ${ODOO_IMAGE:-odoo:19.0}
    image: fashionos-odoo:latest
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8069:8069"
    volumes:
      - ./backend/addons:/mnt/extra-addons
      - odoodata:/var/lib/odoo
    environment:
      HOST: db
      USER: ${DB_USER:-odoo}
      PASSWORD: ${DB_PASSWORD:-odoo_secret}
    # v19 command tối ưu cho development, tự động reload khi sửa code Python
    command: >
      odoo --db_host=db --db_user=${DB_USER:-odoo} --db_password=${DB_PASSWORD:-odoo_secret} --addons-path=/mnt/extra-addons,/usr/lib/python3/dist-packages/odoo/addons --dev=all
    healthcheck:
      test: [ "CMD-SHELL", "curl -sf http://localhost:8069/web/health || exit 1" ]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 60s
    labels:
      - "fashionos.service=backend"

  frontend:
    build:
      context: ./frontend/fashionos-web
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./frontend/fashionos-web:/app
      - /app/node_modules
    environment:
      - NEXT_PUBLIC_ODOO_URL=http://localhost:8069
      - ODOO_INTERNAL_URL=http://odoo:8069
      - WATCHPACK_POLLING=true
    depends_on:
      odoo:
        condition: service_healthy

volumes:
  pgdata:
  odoodata:

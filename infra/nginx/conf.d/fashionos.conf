# FashionOS nginx config
# Replace yourdomain.com with actual domain

# ── Rate-limit zones (defined in http context, outside server blocks) ────────
# auth:    5 req/min per IP  — login, register, password reset (brute-force guard)
# api:     60 req/min per IP — general authenticated API calls
# catalog: 120 req/min per IP — public catalog, read-only, higher tolerance
limit_req_zone $binary_remote_addr zone=fashionos_auth:10m    rate=5r/m;
limit_req_zone $binary_remote_addr zone=fashionos_api:10m     rate=60r/m;
limit_req_zone $binary_remote_addr zone=fashionos_catalog:10m rate=120r/m;

# Return 429 (Too Many Requests) instead of nginx default 503
limit_req_status 429;

# Log rate-limit hits as warnings (not errors)
limit_req_log_level warn;

upstream frontend {
    server frontend:3000;
}

upstream odoo_backend {
    server odoo:8069;
}

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name yourdomain.com www.yourdomain.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name yourdomain.com www.yourdomain.com;

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;

    # Security headers
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options DENY;
    add_header Referrer-Policy strict-origin-when-cross-origin;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    client_max_body_size 50m;

    # ── Auth endpoints — strict: 5/min, burst 3 ────────────────────────────
    location /fashionos/api/v1/auth/ {
        limit_req zone=fashionos_auth burst=3 nodelay;

        proxy_pass http://odoo_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # ── Public catalog — relaxed: 120/min, burst 30 ────────────────────────
    location /fashionos/api/v1/catalog/ {
        limit_req zone=fashionos_catalog burst=30 nodelay;

        proxy_pass http://odoo_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # ── All other API — standard: 60/min, burst 20 ─────────────────────────
    location /fashionos/api/ {
        limit_req zone=fashionos_api burst=20 nodelay;

        proxy_pass http://odoo_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ── Odoo static / web assets (cached) ──────────────────────────────────
    location /web/ {
        proxy_pass http://odoo_backend;
        proxy_set_header Host $host;
        proxy_cache_valid 200 1d;
        proxy_cache nginx_cache;
        add_header X-Cache-Status $upstream_cache_status;
    }

    # ── Next.js frontend (everything else) ─────────────────────────────────
    location / {
        proxy_pass http://frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_cache_bypass $http_upgrade;
    }
}
